    // --- API HANDLER ---
    const makeApiCallWithBackoff = async (url, payload, retries = 5, delay = 1000) => {
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (response.ok) return await response.json();
          
          const errorData = await response.json().catch(() => ({}));
          const errMsg = errorData.error?.message || `HTTP ${response.status}`;

          if (response.status !== 429 && response.status < 500) throw new Error(errMsg);
          if (i === retries - 1) throw new Error(errMsg);

          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        } catch (error) {
          const isValidationFail = error.message && (
            error.message.includes('API key') || 
            error.message.includes('not valid') || 
            error.message.includes('HTTP 4')
          );
          if (isValidationFail || i === retries - 1) throw error;
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
      throw new Error("API request failed after max retries.");
    };

      if (!text) return "";

          return <strong key={index} className="font-extrabold text-white">{part.slice(2, -2)}</strong>;

        return <span key={index}>{part}</span>;

          setApiErrorMsg(e.message || 'Verification Failed.');
        }
      };

      const handleKeyChange = (val) => {
        const cleanedKey = val.replace(/\s/g, ''); 
        setApiKey(cleanedKey);
        if (!cleanedKey) {
          setApiStatus('none');
          setApiErrorMsg('');
        }
      };

      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        setIsUploading(true);

        files.forEach((file) => {
          const reader = new FileReader();
          const fileExt = file.name.split('.').pop().toLowerCase();
          const fileTypeLabel = fileExt.toUpperCase();
          const objectUrl = URL.createObjectURL(file);

          reader.onload = async (event) => {
            let textContent = '';
            let rawBuffer = event.target.result;
            let finalPages = 1;

            if (file.type.startsWith('text/') || fileExt === 'txt') {
              textContent = new TextDecoder().decode(rawBuffer);
            } else if (fileExt === 'pdf') {
              const pdfjsLib = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;
              if (pdfjsLib) {
                try {
                  const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(rawBuffer) }).promise;
                  finalPages = pdf.numPages;
                  let pageTexts = [];
                  for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContentObj = await page.getTextContent();
                    const pageText = textContentObj.items.map(item => item.str).join(' ');
                    pageTexts.push(pageText || `[Empty Page ${i}]`);
                  }
                  textContent = pageTexts.join('\n[PAGEBREAK]\n');
                } catch (err) {
                  console.error("Local PDF parsing crashed, fallback to mock generation", err);
                  textContent = `[Parsed PDF Ingestion Node: ${file.name}]\n\nUnable to extract native text layers. Rendering page canvas directly.`;
                }
              } else {
                textContent = `[Parsed PDF Ingestion Node: ${file.name}]\n\nPDF reader libraries are loading. Launch PDF Viewer tab to view page canvas.`;
              }
            } else {
              textContent = `[Ingested File: ${file.name}]\n\nUnsupported preview format. Text parser only processes PDF and plain text documents.`;
            }

            const detectedTopics = ['Study Source'];
            const lowerName = file.name.toLowerCase();
            if (lowerName.includes('account')) detectedTopics.push('Accountancy', 'Partnership');
            if (lowerName.includes('gdp') || lowerName.includes('macro')) detectedTopics.push('Macroeconomics', 'GDP');
            if (lowerName.includes('demand') || lowerName.includes('market')) detectedTopics.push('Microeconomics', 'Equilibrium');
            if (lowerName.includes('cbse') || lowerName.includes('sqp')) detectedTopics.push('CBSE Prep', 'Model Paper');

            const newDoc = {
              id: `doc-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`,
              name: file.name,
              type: fileTypeLabel,
              status: 'Ready',
              pages: finalPages,
              topics: detectedTopics,
              active: true,
              content: textContent,
              rawData: fileExt === 'pdf' ? rawBuffer : null,
              fileUrl: fileExt === 'pdf' ? objectUrl : null
            };

            setDocuments(prev => [newDoc, ...prev]);
            setViewingDoc(newDoc);
            setIsUploading(false);
          };

          reader.onerror = () => {
            setIsUploading(false);
          };

          reader.readAsArrayBuffer(file);
        });

        if (e.target) e.target.value = '';
      };

      const deleteDocument = (id) => {
        setDocuments(prev => {
          const filtered = prev.filter(doc => doc.id !== id);
          if (viewingDoc && viewingDoc.id === id) {
            setViewingDoc(filtered[0] || null);
          }
          return filtered;
        });
      };

      const toggleDocumentContext = (id) => {
        setDocuments(prev => prev.map(doc => doc.id === id ? { ...doc, active: !doc.active } : doc));
      };

      const renameDocument = (id, newName) => {
        if (!newName.trim()) return;
        setDocuments(prev => prev.map(doc => doc.id === id ? { ...doc, name: newName } : doc));
        if (viewingDoc && viewingDoc.id === id) {
          setViewingDoc(prev => ({ ...prev, name: newName }));
        }
      };

      // --- DYNAMIC CORE REVISION NOTE COMPILING ENGINE ---
      const generateDynamicNote = async (queryTopic, activeDocs) => {
        const localId = `n-${Date.now()}`;
        let defaultTitle = `Summary Note: ${viewingDoc ? viewingDoc.name : 'Study Note'}`;
        let defaultContent = `• **Core Commerce** aggregates successfully parsed.\n• **System equilibrium** and partnership force calculations computed.\n• Important Formula: CBSE standard margins account for all specified variables.`;

        if (!apiKey.trim() || apiStatus !== 'valid') {
          // In sandbox mode, compile a detailed note based on keyword checking
          let customTitle = defaultTitle;
          let customContent = defaultContent;
          
          const topicLower = queryTopic.toLowerCase();
          if (topicLower.includes('accountancy') || topicLower.includes('amit') || topicLower.includes('partnership')) {
            customTitle = "Partnership Accounts Summary";
            customContent = `• Amit withdrew **₹12,000** regularly on the first day of every month.\n• Interest on Amit's Drawings = **(Total Drawings * Rate/100 * 6.5/12)**\n• Total Drawings = ₹12,000 * 12 = **₹1,44,000**.\n• **Revaluation Account** is nominal in nature; profit or loss is distributed among partners in their old profit-sharing ratio.`;
          } else if (topicLower.includes('gdp') || topicLower.includes('macro') || topicLower.includes('national income')) {
            customTitle = "National Income & Related Aggregates";
            customContent = `• **GDP at Market Price** represents the value of all final outputs produced within domestic boundaries.\n• **Real Flow** comprises land, labor, capital, and enterprise moving from households to firms.\n• **Money Flow** aggregates factor payments (rent, wages, interest, profits) paid back to households.`;
          }

          setNotes(prev => [{ id: localId, title: customTitle, content: customContent }, ...prev]);
          return;
        }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const systemPrompt = "You are a professional academic notes taking assistant. Based on the user topic and documents, generate a highly structured high-yield revision card. Use asterisks like **keyword** to highlight critical points. You must return ONLY a valid JSON object matching this schema: { \"title\": \"short note title\", \"content\": \"detailed bullet points notes content\" }";
        
        let docContext = "";
        activeDocs.forEach(doc => {
          docContext += `\n[Document: ${doc.name}]\n${doc.content}\n`;
        });

        const payload = {
          contents: [{ role: "user", parts: [{ text: `Generate study notes for topic: "${queryTopic}". Reference Context: ${docContext}` }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: { 
            responseMimeType: "application/json"
          }
        };

        try {
          const data = await makeApiCallWithBackoff(url, payload, 3, 1000);
          const jsonText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
          if (jsonText) {
            const parsedNote = JSON.parse(jsonText);
            setNotes(prev => [{
              id: `n-${Date.now()}`,
              title: parsedNote.title || defaultTitle,
              content: parsedNote.content || defaultContent
            }, ...prev]);
          }
        } catch (e) {
          setNotes(prev => [{ id: localId, title: defaultTitle, content: defaultContent }, ...prev]);
        }
      };

      // --- DYNAMIC CORE MIND MAP JSON COMPILING ENGINE ---
      const generateDynamicMindMap = async (topic) => {
        const localId = `map-${Date.now()}`;
        let customNode = null;
        const lowerTopic = topic.toLowerCase();

        if (lowerTopic.includes('bop') || lowerTopic.includes('balance of payment') || lowerTopic.includes('payments')) {
          customNode = {
            id: localId,
            name: 'Balance of Payments (BoP)',
            desc: 'Syllabus Economics XII',
            children: [
              {
                id: `${localId}-c1`,
                name: 'Current Account',
                desc: 'Trade in goods & services',
                children: [
                  { id: `${localId}-c1-1`, name: 'Merchandise (Visibles)', desc: 'Export & Import of tangible goods' },
                  { id: `${localId}-c1-2`, name: 'Invisibles Transactions', desc: 'Services, Factor Income, Transfers' }
                ]
              },
              {
                id: `${localId}-c2`,
                name: 'Capital Account',
                desc: 'Asset ownership transfers',
                children: [
                  { id: `${localId}-c2-1`, name: 'Foreign Investments', desc: 'FDI and FII / Portfolio' },
                  { id: `${localId}-c2-2`, name: 'Borrowings & Assistance', desc: 'External commercial loans' }
                ]
              }
            ]
          };
        } else if (lowerTopic.includes('national income') || lowerTopic.includes('gdp')) {
          customNode = {
            id: localId,
            name: 'National Income Accounting',
            desc: 'NNP at Factor Cost',
            children: [
              {
                id: `${localId}-c1`,
                name: 'Aggregating Methods',
                desc: 'Triple flow measurement',
                children: [
                  { id: `${localId}-c1-1`, name: 'Product Method', desc: 'Gross Value Added at MP less Depreciation' },
                  { id: `${localId}-c1-2`, name: 'Income Method', desc: 'Operating Surplus + Compensations' },
                  { id: `${localId}-c1-3`, name: 'Expenditure Method', desc: 'Aggregates final consumption spend' }
                ]
              },
              {
                id: `${localId}-c2`,
                name: 'Key Aggregates',
                desc: 'Syllabus standards',
                children: [
                  { id: `${localId}-c2-1`, name: 'GDP vs GNP', desc: 'Boundary vs Citizenship value' },
                  { id: `${localId}-c2-2`, name: 'Depreciation factor', desc: 'Consumption of fixed capital' }
                ]
              }
            ]
          };
        } else {
          customNode = {
            id: localId,
            name: topic,
            desc: 'Custom Concepts Map',
            children: [
              {
                id: `${localId}-c1`,
                name: 'Core Variables',
                desc: 'Primary indicators',
                children: [
                  { id: `${localId}-c1-1`, name: 'Conceptual Framework', desc: 'Syllabus guidelines' }
                ]
              }
            ]
          };
        }

        if (!apiKey.trim() || apiStatus !== 'valid') {
          setMindMapData(prev => ({ ...prev, [localId]: customNode }));
          setSelectedMap(localId);
          return;
        }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const systemPrompt = 
          "You are a structured mind map generator. Create a hierarchical conceptual tree based on the user topic. " +
          "You must return ONLY a valid JSON object matching this schema:\n" +
          "{\n" +
          "  \"id\": \"string unique root identifier\",\n" +
          "  \"name\": \"string concept name\",\n" +
          "  \"desc\": \"short description\",\n" +
          "  \"children\": [\n" +
          "    {\n" +
          "      \"id\": \"unique sub-identifier\",\n" +
          "      \"name\": \"subconcept name\",\n" +
          "      \"desc\": \"short description\",\n" +
          "      \"children\": [\n" +
          "        { \"id\": \"leaf-id\", \"name\": \"leaf concept\", \"desc\": \"leaf desc\" }\n" +
          "      ]\n" +
          "    }\n" +
          "  ]\n" +
          "}";

        const payload = {
          contents: [{ role: "user", parts: [{ text: `Generate a mind map for topic: "${topic}"` }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: { responseMimeType: "application/json" }
        };

        try {
          const data = await makeApiCallWithBackoff(url, payload, 3, 1000);
          const jsonText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
          if (jsonText) {
            const parsedMap = JSON.parse(jsonText);
            const mapKey = `custom-${Date.now()}`;
            setMindMapData(prev => ({ ...prev, [mapKey]: parsedMap }));
            setSelectedMap(mapKey);
          }
        } catch (e) {
          setMindMapData(prev => ({ ...prev, [localId]: customNode }));
          setSelectedMap(localId);
        }
      };

      // --- AGENTIC AI TERMINAL CO-PILOT SUBMIT ---
      const handleChatSend = async () => {
        if (!chatInput.trim() || isThinking) return;

        const query = chatInput;
        setChatHistory(prev => [...prev, { role: 'user', content: query }]);
        setChatInput('');
        setIsThinking(true);

        const activeDocs = documents.filter(d => d.active);
        const lowerQ = query.toLowerCase();

        let interceptGraphType = null;
        let shiftValue = 0;
        let ceilingFloor = 'none';
        let taxSubsidy = 'none';

        if (lowerQ.includes('graph') || lowerQ.includes('draw') || lowerQ.includes('curve') || lowerQ.includes('equilibrium') || lowerQ.includes('model')) {
          if (lowerQ.includes('ad-as') || lowerQ.includes('aggregate')) {
            interceptGraphType = 'ad_as';
          } else if (lowerQ.includes('inflation') || lowerQ.includes('gdp')) {
            interceptGraphType = 'inflation_gdp';
          } else {
            interceptGraphType = 'market_equilibrium';
          }

          if (lowerQ.includes('right') || lowerQ.includes('increase') || lowerQ.includes('expand')) {
            shiftValue = 30;
          } else if (lowerQ.includes('left') || lowerQ.includes('decrease') || lowerQ.includes('contract')) {
            shiftValue = -30;
          }

          if (lowerQ.includes('ceiling') || lowerQ.includes('maximum price')) {
            ceilingFloor = 'ceiling';
          } else if (lowerQ.includes('floor') || lowerQ.includes('minimum price')) {
            ceilingFloor = 'floor';
          }

          if (lowerQ.includes('tax')) {
            taxSubsidy = 'tax';
          } else if (lowerQ.includes('subsidy')) {
            taxSubsidy = 'subsidy';
          }
        }

        let triggerMindMapTopic = null;
        if (lowerQ.includes('mind map') || lowerQ.includes('mindmap') || lowerQ.includes('concept map') || lowerQ.includes('conceptmap') || lowerQ.includes('hierarchy tree')) {
          const match = query.match(/(?:mind\s?map\s+for|mindmap\s+for|mind\s?map\s+of|mindmap\s+of|concept\s?tree\s+for|concept\s?map\s+of)\s+([^?.]+)/i);
          triggerMindMapTopic = match ? match[1].trim() : null;
          if (!triggerMindMapTopic) {
            triggerMindMapTopic = query.replace(/mind\s?map/gi, '').replace(/mindmap/gi, '').replace(/generate/gi, '').replace(/create/gi, '').replace(/draw/gi, '').trim();
            if (!triggerMindMapTopic) triggerMindMapTopic = "Study Concept";
          }
        }

        let triggerNotes = false;
        if (lowerQ.includes('note') || lowerQ.includes('summarize') || lowerQ.includes('summary') || lowerQ.includes('bullet points')) {
          triggerNotes = true;
        }

        // INTERCEPT SYSTEM: Stop default chat flow and trigger isolated visual tab renders
        if (interceptGraphType || triggerMindMapTopic || triggerNotes) {
          if (interceptGraphType) {
            const newGraphId = `graph-${Date.now()}`;
            const newGraphObj = {
              id: newGraphId,
              type: interceptGraphType,
              shiftValue: shiftValue,
              ceilingFloor: ceilingFloor,
              taxSubsidy: taxSubsidy,
              title: interceptGraphType === 'market_equilibrium' ? 'Market Equilibrium' : (interceptGraphType === 'ad_as' ? 'AD-AS Model' : 'GDP & Inflation Gap')
            };
            setGeneratedGraphs(prev => [...prev, newGraphObj]);
            setActiveGraphId(newGraphId);
            setActiveTab('graphs');
            setChatHistory(prev => [...prev, { role: 'assistant', content: `I have plotted your customized Economic Diagram inside the **Graphs Tab**!\n\nParameters applied:\n- Graph Model: ${interceptGraphType}\n- Curve shift: ${shiftValue}` }]);
          }
          if (triggerMindMapTopic) {
            await generateDynamicMindMap(triggerMindMapTopic);
            setActiveTab('mindmaps');
            setChatHistory(prev => [...prev, { role: 'assistant', content: `I have successfully constructed a hierarchical Mind Map for **${triggerMindMapTopic}**! You can expand or collapse the nested sections inside the **Mind Maps Tab**.` }]);
          }
          if (triggerNotes) {
            await generateDynamicNote(query, activeDocs);
            setActiveTab('notes');
            setChatHistory(prev => [...prev, { role: 'assistant', content: `I have dynamically generated a high-yield study note card inside your **Notes Tab** based on your request: "${query}"!` }]);
          }
          setIsThinking(false);
          return; 
        }

        let systemPrompt = "You are a professional, friendly, and agentic AI co-pilot designed to help Commerce, Economics, and Accountancy students master syllabus topics. Provide safe, age-appropriate (under 18), clean, and healthy responses, avoiding any harmful, illegal, or suggestive topics like drugs, tobacco, gambling, or violence.\n\n";

        if (activeDocs.length > 0) {
          if (sourcesOnly) {
            systemPrompt += "STRICT SOURCE MODE IS ACTIVE. You must answer the user's question using ONLY the provided document context below. If the answer is not in the context, state that you cannot find it in the uploaded documents. Do not use outside knowledge.\n\n";
          } else {
            systemPrompt += "You should use the provided document context below as your primary reference, but you are free to use your general economics/accountancy knowledge to expand or answer general questions.\n\n";
          }
          
          systemPrompt += "--- START OF UPLOADED DOCUMENT CONTEXT ---\n";
          activeDocs.forEach(doc => {
            systemPrompt += `\n[DOCUMENT: ${doc.name}]\n${doc.content.replace(/\[PAGEBREAK\]/g, '\n')}\n`;
          });
          systemPrompt += "--- END OF UPLOADED DOCUMENT CONTEXT ---\n";
        } else {
          systemPrompt += "No documents are currently active. Answer using your general knowledge.";
        }

        if (apiKey.trim() && apiStatus === 'valid') {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
          const payload = {
            contents: [{ role: "user", parts: [{ text: `${systemPrompt}\n\nUser Question: ${query}` }] }]
          };

          if (googleGrounding) {
            payload.tools = [{ "google_search": {} }];
          }

          try {
            const result = await makeApiCallWithBackoff(url, payload, 5, 1000);
            const text = result?.candidates?.[0]?.content?.parts?.[0]?.text || "No response received. Please try again.";
            setChatHistory(prev => [...prev, { role: 'assistant', content: text }]);
          } catch (err) {
            setChatHistory(prev => [...prev, { role: 'assistant', content: `API Error: ${err.message}` }]);
          } finally {
            setIsThinking(false);
          }
        } else {
          // High-Fidelity Local Simulation Engine
          setTimeout(() => {
            let response = `[Simulation Sandbox Mode] Local knowledge processed: "${query}". Setup key in Settings for full agentic live answers.`;
            setChatHistory(prev => [...prev, { role: 'assistant', content: response }]);
            setIsThinking(false);
          }, 1000);
        }
      };

      const renderSelectedTab = () => {
        switch (activeTab) {
          case 'dashboard':
            return <DashboardTab setActiveTab={setActiveTab} theme={theme} />;
          case 'sources':
            return (
              <SourcesTab 
                documents={documents} 
                viewingDoc={viewingDoc} 
                setViewingDoc={setViewingDoc}
                toggleDocumentContext={toggleDocumentContext}
                deleteDocument={deleteDocument}
                renameDocument={renameDocument}
                handleFileUpload={handleFileUpload}
                isUploading={isUploading}
                theme={theme}
                setActiveTab={setActiveTab}
              />
            );
          case 'pdfviewer':
            return (
              <PdfViewerTab 
                viewingDoc={viewingDoc}
                pdfLibLoaded={pdfLibLoaded}
                pdfZoom={pdfZoom}
                setPdfZoom={setPdfZoom}
                pdfMode={pdfMode}
                setPdfMode={setPdfMode}
                theme={theme}
              />
            );
          case 'chat':
            return (
              <ChatWorkspace 
                chatHistory={chatHistory} 
                chatInput={chatInput} 
                setChatInput={setChatInput} 
                handleChatSend={handleChatSend} 
                isThinking={isThinking} 
                theme={theme}
                sourcesOnly={sourcesOnly}
                activeDocsCount={documents.filter(d => d.active).length}
                chatBottomRef={chatBottomRef}
              />
            );
          case 'notes':
            return <NotesTab notes={notes} setNotes={setNotes} theme={theme} />;
          case 'graphs':
            return (
              <GraphsTab 
                generatedGraphs={generatedGraphs}
                activeGraphId={activeGraphId}
                setActiveGraphId={setActiveGraphId}
                setGeneratedGraphs={setGeneratedGraphs}
                theme={theme} 
              />
            );
          case 'mindmaps':
            return (
              <MindMapsTab 
                selectedMap={selectedMap}
                setSelectedMap={setSelectedMap}
                collapsedNodes={collapsedNodes}
                setCollapsedNodes={setCollapsedNodes}
                theme={theme} 
                mindMapData={mindMapData}
              />
            );
          case 'settings':
            return (
              <SettingsTab 
                apiKey={apiKey} 
                handleKeyChange={handleKeyChange} 
                apiStatus={apiStatus} 
                apiErrorMsg={apiErrorMsg}
                validateApiKey={validateApiKey}
                sourcesOnly={sourcesOnly}
                setSourcesOnly={setSourcesOnly}
                googleGrounding={googleGrounding}
                setGoogleGrounding={setGoogleGrounding}
                theme={theme} 
              />
            );
          default:
            return null;
        }
      };

      return (
        <div className={`h-screen w-screen flex flex-col transition-colors duration-300 font-sans overflow-hidden ${
          theme === 'dark' ? 'bg-[#050507] text-zinc-100' : 'bg-[#f4f4f7] text-zinc-800'
        }`}>
          {theme === 'dark' && (
            <div className="absolute inset-0 pointer-events-none overflow-hidden z-0">
              <div className="absolute top-[-10%] left-[-15%] w-[60vw] h-[60vw] rounded-full bg-blue-600/10 mix-blend-screen filter blur-[150px] animate-pulse"></div>
              <div className="absolute bottom-[-10%] right-[-15%] w-[50vw] h-[50vw] rounded-full bg-purple-600/10 mix-blend-screen filter blur-[140px]"></div>
              <div className="absolute top-[30%] right-[10%] w-[40vw] h-[40vw] rounded-full bg-cyan-600/10 mix-blend-screen filter blur-[120px]"></div>
            </div>
          )}

          <input 
            type="file" 
            id="file-upload-input"
            onChange={handleFileUpload} 
            multiple 
            accept=".pdf,.docx,.pptx,.txt" 
            className="opacity-0 absolute w-0 h-0 pointer-events-none" 
          />

          <header className="px-8 py-4 bg-black/20 border-b border-white/5 flex justify-between items-center relative z-10 select-none shrink-0 w-full">
            <div className="flex items-center gap-3">
              <div className="p-2.5 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-2xl shadow-lg shadow-blue-500/20">
                <Sparkles size={20} className="text-white" />
              </div>
              <div>
                <h1 className={`text-2xl ${neonGradient}`}>FinanceMind AI</h1>
                <p className="text-[10px] text-zinc-500 uppercase tracking-widest mt-0.5">--shashank</p>
              </div>
            </div>

            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs">
                <span className="text-zinc-500">LLM Endpoint:</span>
                <span className={`w-2.5 h-2.5 rounded-full ${
                  apiStatus === 'valid' ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' :
                  apiStatus === 'checking' ? 'bg-yellow-400 animate-pulse' : 'bg-red-500'
                }`}></span>
                <span className="text-[10px] font-mono text-zinc-400 uppercase">
                  {apiStatus === 'valid' ? 'ONLINE' : apiStatus === 'checking' ? 'CHECKING' : 'SANDBOX'}
                </span>
              </div>

              <button 
                onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                className={`p-2.5 rounded-xl transition-all ${glassButton}`}
              >
                {theme === 'dark' ? <Sun size={15} className="text-yellow-400" /> : <Moon size={15} className="text-purple-600" />}
              </button>
            </div>
          </header>

          <main className="flex-1 flex flex-col h-full relative z-10 overflow-hidden w-full p-6">
            <div className="w-full mb-6">
              <div className="grid grid-cols-4 lg:grid-cols-8 gap-2 p-1.5 bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.2)]">
                <TabNavButton id="dashboard" label="Dashboard" active={activeTab} onClick={setActiveTab} icon={<LayoutDashboard size={15} />} />
                <TabNavButton id="sources" label="Sources" active={activeTab} onClick={setActiveTab} icon={<Files size={15} />} />
                <TabNavButton id="pdfviewer" label="PDF Viewer" active={activeTab} onClick={setActiveTab} icon={<Eye size={15} />} />
                <TabNavButton id="chat" label="Chat" active={activeTab} onClick={setActiveTab} icon={<MessageSquare size={15} />} />
                <TabNavButton id="notes" label="Notes" active={activeTab} onClick={setActiveTab} icon={<BookOpen size={15} />} />
                <TabNavButton id="graphs" label="Graphs" active={activeTab} onClick={setActiveTab} icon={<BarChart2 size={15} />} />
                <TabNavButton id="mindmaps" label="Mind Maps" active={activeTab} onClick={setActiveTab} icon={<GitCommit size={15} />} />
                <TabNavButton id="settings" label="Settings" active={activeTab} onClick={setActiveTab} icon={<Settings size={15} />} />
              </div>
            </div>

            <div className="flex-1 overflow-hidden">

    function PdfCanvasRenderer({ rawData, zoom, pdfLibLoaded }) {
      const [pages, setPages] = React.useState([]);
      const [rendering, setRendering] = React.useState(false);
      const containerRef = useRef(null);

      React.useEffect(() => {
        if (!pdfLibLoaded || !rawData) return;
        const pdfjsLib = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;
        if (!pdfjsLib) return;

        let isCurrent = true;
        setRendering(true);
        setPages([]);

        const loadPdf = async () => {
          try {
            const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(rawData) }).promise;
            const renderedPages = [];

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
              if (!isCurrent) return;
              const page = await pdf.getPage(pageNum);
              renderedPages.push(page);
            }

            if (isCurrent) {
              setPages(renderedPages);
              setRendering(false);
            }
          } catch (err) {
            console.error("PDF.js render task crashed:", err);
            setRendering(false);
          }
        };

        loadPdf();

        return () => {
          isCurrent = false;
        };
      }, [rawData, pdfLibLoaded]);

      return (
        <div ref={containerRef} className="w-full flex flex-col items-center space-y-8 py-8">
          {rendering && (
            <div className="flex flex-col items-center justify-center p-12 text-zinc-300 gap-3">
              <Loader className="animate-spin text-purple-400" size={24} />
              <span className="text-xs font-mono">Parsing PDF pages onto local canvas...</span>
            </div>
          )}

          {pages.map((page, index) => (
            <PdfPageCanvas key={index} page={page} pageNum={index + 1} totalPages={pages.length} zoom={zoom} />
          ))}
        </div>
      );
    }

    function PdfPageCanvas({ page, pageNum, totalPages, zoom }) {
      const canvasRef = useRef(null);
      const [loading, setLoading] = useState(true);

      React.useEffect(() => {
        if (!page || !canvasRef.current) return;

        let renderTask = null;
        let isCurrent = true;

        const renderPage = async () => {
          setLoading(true);
          const canvas = canvasRef.current;
          const context = canvas.getContext('2d');

          const scale = (zoom / 100) * 1.5; 
          const viewport = page.getViewport({ scale });

          const dpr = window.devicePixelRatio || 1;
          canvas.width = viewport.width * dpr;
          canvas.height = viewport.height * dpr;
          canvas.style.width = `${viewport.width}px`;
          canvas.style.height = `${viewport.height}px`;

          context.setTransform(dpr, 0, 0, dpr, 0, 0);

          const renderContext = {
            canvasContext: context,
            viewport: viewport
          };

          try {
            renderTask = page.render(renderContext);
            await renderTask.promise;
            if (isCurrent) {
              setLoading(false);
            }
          } catch (err) {
            const isCancel = err && (err.name === 'RenderingCancelledException' || (err.message && err.message.toLowerCase().includes('cancelled')));
            if (!isCancel && isCurrent) {
              console.error("Single page render error:", err);
            }
          }
        };

        renderPage();

        return () => {
          isCurrent = false;
          if (renderTask) {
            renderTask.cancel();
          }
        };
      }, [page, zoom]);

      return (
        <div className="relative shadow-2xl rounded-lg overflow-hidden border border-zinc-800 bg-white shrink-0">
          {loading && (
            <div className="absolute inset-0 bg-white/90 backdrop-blur-xs flex items-center justify-center text-xs text-zinc-500 font-mono z-10">
              Page {pageNum} is drawing...
            </div>
          )}
          <canvas ref={canvasRef} className="block max-w-full" style={{ display: 'block' }} />
          <div className="absolute bottom-3 right-4 px-2.5 py-1 bg-black/75 rounded text-[9px] font-mono text-zinc-300 z-10 select-none">
            PAGE {pageNum} OF {totalPages}
          </div>
        </div>
      );
    }
